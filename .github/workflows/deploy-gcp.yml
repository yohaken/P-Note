name: Deploy to Google Cloud

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_ID: mypeer-501909
  REGION: asia-southeast1
  SERVICE_NAME: p-note-api
  REPOSITORY: p-note

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Ensure Artifact Registry repository
        run: |
          gcloud artifacts repositories describe ${{ env.REPOSITORY }} \
            --location=${{ env.REGION }} 2>/dev/null || \
          gcloud artifacts repositories create ${{ env.REPOSITORY }} \
            --repository-format=docker \
            --location=${{ env.REGION }} \
            --description="P-Note Docker images"

      - name: Ensure Firestore database (Native mode)
        run: |
          gcloud services enable firestore.googleapis.com --project ${{ env.PROJECT_ID }} || true
          gcloud firestore databases describe --project ${{ env.PROJECT_ID }} 2>/dev/null || \
          gcloud firestore databases create \
            --project ${{ env.PROJECT_ID }} \
            --location=${{ env.REGION }} \
            --type=firestore-native || true

      - name: Build and push backend image
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/api:${{ github.sha }}"
          docker build -t "$IMAGE" ./backend
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image="$IMAGE" \
            --region=${{ env.REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --max-instances=1 \
            --min-instances=0 \
            --memory=256Mi \
            --set-env-vars="ALLOWED_EMAIL=phiraphong.yoh@gmail.com,GCP_PROJECT_ID=${{ env.PROJECT_ID }}"

      - name: Get Cloud Run URL
        id: run-url
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --format='value(status.url)')
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Cloud Run URL: $URL"

      - name: Deploy Firebase Hosting
        run: npx firebase-tools@13 deploy --only hosting --project ${{ env.PROJECT_ID }} --non-interactive

      - name: Deployment summary
        run: |
          echo "## Deployment complete" >> $GITHUB_STEP_SUMMARY
          echo "- API: ${{ steps.run-url.outputs.url }}/api/health" >> $GITHUB_STEP_SUMMARY
          echo "- App: https://${{ env.PROJECT_ID }}.web.app" >> $GITHUB_STEP_SUMMARY
