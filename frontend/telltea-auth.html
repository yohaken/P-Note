<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="robots" content="noindex" />
  <title>TellTea — เข้าสู่ระบบ</title>
  <style>
    :root { color-scheme: light; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Sarabun", "Segoe UI", sans-serif;
      background: linear-gradient(160deg, #e8f2ec 0%, #f7f3ea 55%, #fff 100%);
      color: #1f2a24;
      padding: 1.5rem;
      box-sizing: border-box;
    }
    .card { max-width: 22rem; text-align: center; }
    .brand {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 2rem;
      font-weight: 700;
      color: #2f6b4f;
      margin: 0 0 0.5rem;
    }
    p { margin: 0.4rem 0; line-height: 1.45; }
    .muted { color: #5c6b63; font-size: 0.95rem; }
    .error { color: #b42318; margin-top: 1rem; white-space: pre-wrap; }
    button {
      margin-top: 1rem;
      border: 0;
      border-radius: 999px;
      background: #2f6b4f;
      color: #fff;
      font: inherit;
      font-weight: 600;
      padding: 0.75rem 1.25rem;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="card">
    <p class="brand">TellTea</p>
    <p id="status">กำลังเตรียมเข้าสู่ระบบ...</p>
    <p class="muted">ใช้บัญชี Google ของร้าน · เปิดใน Safari/Chrome</p>
    <p id="error" class="error"></p>
    <button id="retry" type="button" hidden>ลองอีกครั้ง</button>
  </div>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
    import {
      initializeAuth,
      getAuth,
      indexedDBLocalPersistence,
      browserLocalPersistence,
      browserPopupRedirectResolver,
      GoogleAuthProvider,
      signInWithRedirect,
      getRedirectResult,
      onAuthStateChanged,
    } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";
    import {
      getFirestore,
      doc,
      setDoc,
    } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

    const RETURN_KEY = "telltea_auth_return";
    const PENDING_KEY = "telltea_auth_pending";
    const DEFAULT_RETURN = "https://telltea-shop.web.app/login/";
    const ALLOWED_RETURNS = new Set([
      "https://telltea-shop.web.app",
      "https://telltea-shop.firebaseapp.com",
      "http://localhost:3000",
      "http://127.0.0.1:3000",
    ]);

    const statusEl = document.getElementById("status");
    const errorEl = document.getElementById("error");
    const retryBtn = document.getElementById("retry");

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function showError(message) {
      errorEl.textContent = message;
      retryBtn.hidden = false;
    }

    function safeReturnUrl(raw) {
      try {
        const url = new URL(raw);
        if (!ALLOWED_RETURNS.has(url.origin)) return null;
        return url;
      } catch {
        return null;
      }
    }

    function resolveReturnUrl() {
      const fromQuery = safeReturnUrl(new URLSearchParams(location.search).get("return") || "");
      if (fromQuery) {
        sessionStorage.setItem(RETURN_KEY, fromQuery.toString());
        return fromQuery;
      }
      const saved = safeReturnUrl(sessionStorage.getItem(RETURN_KEY) || "");
      if (saved) return saved;
      return new URL(DEFAULT_RETURN);
    }

    function ticketId() {
      const bytes = new Uint8Array(24);
      crypto.getRandomValues(bytes);
      return [...bytes].map((b) => b.toString(16).padStart(2, "0")).join("");
    }

    const app = initializeApp({
      apiKey: "AIzaSyD_b7TASutFOmoUKskH6yLjmxJzVpTUIn4",
      authDomain: "mypeer-501909.firebaseapp.com",
      projectId: "mypeer-501909",
      appId: "1:470549580687:web:9ecb91bc7812d203b719fa",
    });

    let auth;
    try {
      auth = initializeAuth(app, {
        persistence: [indexedDBLocalPersistence, browserLocalPersistence],
        popupRedirectResolver: browserPopupRedirectResolver,
      });
    } catch {
      auth = getAuth(app);
    }
    const db = getFirestore(app);
    const returnUrl = resolveReturnUrl();

    async function finishWithGoogleIdToken(idToken) {
      setStatus("สำเร็จ — กำลังกลับไป TellTea...");
      const id = ticketId();
      const exp = Date.now() + 2 * 60 * 1000;
      await setDoc(doc(db, "loginTickets", id), {
        idToken,
        createdAt: Date.now(),
        exp,
      });
      sessionStorage.removeItem(PENDING_KEY);
      sessionStorage.removeItem(RETURN_KEY);
      const target = new URL(returnUrl.toString());
      target.searchParams.set("ticket", id);
      target.hash = "";
      location.replace(target.toString());
    }

    function googleIdTokenFromResult(result) {
      const credential = GoogleAuthProvider.credentialFromResult(result);
      if (credential?.idToken) return credential.idToken;
      const oauthIdToken = result?._tokenResponse?.oauthIdToken;
      return typeof oauthIdToken === "string" ? oauthIdToken : null;
    }

    async function waitForUser(ms = 2500) {
      if (auth.currentUser) return auth.currentUser;
      return new Promise((resolve) => {
        const timer = setTimeout(() => {
          unsub();
          resolve(auth.currentUser);
        }, ms);
        const unsub = onAuthStateChanged(auth, (user) => {
          if (!user) return;
          clearTimeout(timer);
          unsub();
          resolve(user);
        });
      });
    }

    async function startLogin() {
      errorEl.textContent = "";
      retryBtn.hidden = true;
      setStatus("กำลังเปิด Google...");
      sessionStorage.setItem(RETURN_KEY, returnUrl.toString());
      sessionStorage.setItem(PENDING_KEY, "1");

      const provider = new GoogleAuthProvider();
      provider.addScope("email");
      provider.addScope("profile");
      provider.setCustomParameters({ prompt: "select_account" });
      await signInWithRedirect(auth, provider);
    }

    async function boot() {
      setStatus("กำลังตรวจสอบการล็อกอิน...");
      const pending = sessionStorage.getItem(PENDING_KEY) === "1";
      try {
        await auth.authStateReady();
        const result = await getRedirectResult(auth);
        if (result) {
          const idToken = googleIdTokenFromResult(result);
          if (!idToken) throw new Error("ไม่ได้รับ Google ID token");
          await finishWithGoogleIdToken(idToken);
          return;
        }

        // Redirect result can be empty on some mobile browsers even after success.
        if (pending) {
          await waitForUser();
          // Without the OAuth ID token we cannot hop domains — ask user to retry once.
          sessionStorage.removeItem(PENDING_KEY);
          showError("ล็อกอินมือถือไม่ครบ — กดลองอีกครั้ง");
          setStatus("ต้องลองอีกครั้ง");
          return;
        }

        await startLogin();
      } catch (err) {
        console.error(err);
        sessionStorage.removeItem(PENDING_KEY);
        showError(err?.message || "ล็อกอินไม่สำเร็จ");
        setStatus("ล็อกอินไม่สำเร็จ");
      }
    }

    retryBtn.addEventListener("click", () => {
      void startLogin().catch((err) => {
        showError(err?.message || "ล็อกอินไม่สำเร็จ");
      });
    });

    void boot();
  </script>
</body>
</html>
