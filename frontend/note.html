    }
    .cloud-strip[data-state="error"] {
      border-color: rgba(248,113,113,0.35); background: rgba(248,113,113,0.08);
    }
  @keyframes cloud-pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.45; transform: scale(0.85); }
    }
    .cloud-strip-label { font-weight: 700; flex-shrink: 0; min-width: 4.8rem; }
    .cloud-strip-text { flex: 1; min-width: 0; color: var(--muted); }
    .cloud-strip[data-state="online"] .cloud-strip-text { color: var(--success); }
    .cloud-strip[data-state="error"] .cloud-strip-text { color: var(--danger); }
    .cloud-strip-action {
      flex-shrink: 0; border: none; border-radius: 7px; padding: 0.28rem 0.5rem;
      font-size: 0.62rem; font-weight: 700; background: var(--surface-2); color: var(--text);
    }
    .cloud-strip-action:disabled { opacity: 0.45; }
    .btn-sm.cloud-on { color: var(--success); border-color: rgba(74,222,128,0.35); }
    .btn-sm.cloud-busy {
      color: #fbbf24; border-color: rgba(251,191,36,0.35);
      display: inline-flex; align-items: center; justify-content: center;
      animation: cloud-spin 0.85s linear infinite;
    }
    @keyframes cloud-spin { to { transform: rotate(360deg); } }

    .edit-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      z-index: 50; align-items: flex-end; justify-content: center;
      padding: 1rem; padding-bottom: calc(1rem + var(--safe-bottom));
    }
    .edit-overlay.open { display: flex; }
    .edit-sheet {
      background: var(--surface); border-radius: var(--radius); padding: 1rem;
      width: 100%; max-width: 480px; max-height: 85dvh; overflow-y: auto; box-shadow: var(--shadow);
    }
    .edit-sheet-form {
      display: flex; flex-direction: column; padding: 0;
      max-height: min(92dvh, calc(100dvh - 1.5rem)); overflow: hidden;
    }
    .edit-sheet-header {
      flex-shrink: 0; padding: 0.8rem 1rem 0.45rem;
      border-bottom: 1px solid var(--surface-2);
    }
    .edit-sheet-header h3 { margin-bottom: 0.1rem; }
    .sheet-scroll-hint { font-size: 0.58rem; color: var(--muted); margin: 0; }
    .edit-sheet-body {
      flex: 1 1 auto; min-height: 0; overflow-y: auto; overflow-x: hidden;
      -webkit-overflow-scrolling: touch; overscroll-behavior-y: contain;
      touch-action: pan-y; padding: 0.6rem 1rem 0.75rem;
    }
    .edit-sheet-footer {
      flex-shrink: 0; margin-top: 0; padding: 0.6rem 1rem calc(0.65rem + var(--safe-bottom));
      border-top: 1px solid var(--surface-2); background: var(--surface);
    }
    .sheet-section-label {
      font-size: 0.68rem; font-weight: 600; color: var(--accent);
      text-transform: uppercase; letter-spacing: 0.03em; margin: 0.15rem 0 0.45rem;
    }
    .edit-sheet h3 { font-size: 0.9rem; margin-bottom: 0.25rem; }
    .edit-sheet .sheet-desc { font-size: 0.72rem; color: var(--muted); margin-bottom: 0.7rem; }
    .edit-actions { display: flex; gap: 0.35rem; margin-top: 0.7rem; }
    .edit-actions .btn { flex: 1; }

    .confirm-pop-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45);
      z-index: 60; align-items: center; justify-content: center; padding: 1rem;
    }
    .confirm-pop-overlay.open { display: flex; }
    .confirm-pop {
      background: var(--surface); border-radius: var(--radius); padding: 0.85rem 1rem;
      width: 100%; max-width: 280px; box-shadow: var(--shadow);
    }
    .confirm-pop-title { font-size: 0.85rem; font-weight: 600; margin-bottom: 0.3rem; }
    .confirm-pop-body { font-size: 0.76rem; color: var(--muted); margin-bottom: 0.65rem; line-height: 1.4; white-space: pre-line; }
    .confirm-pop-actions { display: flex; gap: 0.35rem; }
    .confirm-pop-actions .btn { flex: 1; padding: 0.45rem; font-size: 0.82rem; }

    .toast {
      position: fixed; bottom: calc(1rem + var(--safe-bottom)); left: 50%;
      transform: translateX(-50%) translateY(120%); padding: 0.55rem 1rem;
      border-radius: 10px; font-size: 0.8rem; font-weight: 500; z-index: 100;
      transition: transform 0.3s; max-width: calc(100% - 2rem); text-align: center;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.error { background: var(--danger); color: #fff; }
    .toast.success { background: var(--success); color: #0f172a; }
    .reorder-hint { font-size: 0.58rem; color: var(--muted); text-align: center; margin-bottom: 0.35rem; }

    .update-toast {
      position: fixed;
      left: 50%;
      bottom: calc(1.5rem + env(safe-area-inset-bottom, 0px));
      transform: translateX(-50%) translateY(10px);
      z-index: 90;
      max-width: min(90vw, 340px);
      padding: 0.55rem 0.9rem;
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 500;
      text-align: center;
      color: #fff;
      background: var(--surface-2);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease, transform 0.25s ease;
    }
    .update-toast.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    .update-toast[hidden]:not(.visible) { display: none; }
  </style>
</head>
<body>
  <div class="app">
    <div class="top-bar">
      <h1>Note</h1>
      <div class="top-actions">
        <button type="button" class="btn-sm" id="btnTheme">☀️</button>
        <button type="button" class="btn-sm" id="btnSettings">⚙️</button>
      </div>
    </div>
    <div class="cloud-strip" id="dbStrip" data-state="connecting" role="status" aria-live="polite">
      <span class="cloud-strip-dot" aria-hidden="true"></span>
      <span class="cloud-strip-label">ฐานข้อมูล</span>
      <span class="cloud-strip-text" id="dbStripText">กำลังเชื่อม Firestore…</span>
      <button type="button" class="cloud-strip-action" id="dbStripAction">ซิงก์</button>
    </div>
    <p class="reorder-hint">ลาก ⋮⋮ เพื่อย้ายกล่องสลับแผ่นงาน — จำตำแหน่งเหมือนหน้า Calorie</p>
    <div id="blocksContainer">
      <div class="sortable-block" data-block-id="pages">
        <span class="drag-handle" aria-hidden="true">⋮⋮</span>
        <nav class="page-tabs" id="pageTabs" aria-label="เมนูหลัก">
          <button type="button" class="page-tab" data-page="calorie" id="tab-calorie">Calorie</button>
          <button type="button" class="page-tab active" data-page="note" id="tab-note">Note</button>
        </nav>
      </div>
    </div>
    <div class="page-panel" id="page-note" data-page="note">
      <div class="empty-page">
        <strong>Note</strong>
        <span>หน้าว่าง — คัดลอกจากหน้าเว็บเดิมทั้งก้อนก่อน แล้วเคลียร์เนื้อหา</span>
      </div>
    </div>
  </div>

  <div class="toast success" id="toast"></div>

  <script>
    const SPACE_ID_KEY = 'calorie_space_id';
    const SPACE_RE = /^[A-Za-z0-9_-]{6,64}$/;
    const API_BASE_URL = (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
      ? 'http://localhost:8080'
      : 'https://p-note-api-cwpgmqlv2q-as.a.run.app';

    const $ = (s) => document.querySelector(s);
    const els = {
      pageTabs: $('#pageTabs'),
      dbStrip: $('#dbStrip'),
      dbStripText: $('#dbStripText'),
      dbStripAction: $('#dbStripAction'),
      btnTheme: $('#btnTheme'),
      btnSettings: $('#btnSettings'),
      toast: $('#toast'),
    };

    let toastTimer;
    function showToast(msg, type) {
      if (!els.toast) return;
      els.toast.textContent = msg;
      els.toast.className = 'toast show ' + (type || 'success');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => els.toast.classList.remove('show'), 2200);
    }

    function showPage(pageId) {
      if (pageId === 'calorie') {
        location.href = './index.html';
        return;
      }
      document.querySelectorAll('.page-tab').forEach((btn) => {
        btn.classList.toggle('active', btn.dataset.page === pageId);
      });
    }

    if (els.pageTabs) {
      els.pageTabs.addEventListener('click', (e) => {
        const btn = e.target.closest('.page-tab');
        if (btn) showPage(btn.dataset.page);
      });
    }

    function getSpaceId() {
      let id = localStorage.getItem(SPACE_ID_KEY);
      if (!id || !SPACE_RE.test(id)) {
        id = 'sp-' + Math.random().toString(36).slice(2, 12);
        localStorage.setItem(SPACE_ID_KEY, id);
      }
      return id;
    }

    function setDbStrip(state, text) {
      if (els.dbStrip) els.dbStrip.dataset.state = state;
      if (els.dbStripText) els.dbStripText.textContent = text;
    }

    async function refreshDbStatus() {
      setDbStrip('connecting', 'กำลังเชื่อม Firestore…');
      try {
        const res = await fetch(API_BASE_URL + '/api/db-status', { mode: 'cors' });
        const body = res.ok ? await res.json() : null;
        if (body && body.ok) setDbStrip('online', 'พร้อม · รหัส ' + getSpaceId().slice(0, 10) + '…');
        else setDbStrip('offline', 'ฐานข้อมูลออฟไลน์');
      } catch {
        setDbStrip('offline', 'ฐานข้อมูลออฟไลน์');
      }
    }

    function loadTheme() {
      try {
        const s = JSON.parse(localStorage.getItem('calorieTracker:settings') || '{}');
        return s.theme === 'light' ? 'light' : 'dark';
      } catch { return 'dark'; }
    }

    function applyTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme === 'light' ? 'light' : 'dark');
      try {
        const s = JSON.parse(localStorage.getItem('calorieTracker:settings') || '{}');
        s.theme = theme === 'light' ? 'light' : 'dark';
        localStorage.setItem('calorieTracker:settings', JSON.stringify(s));
      } catch { /* ignore */ }
      if (els.btnTheme) els.btnTheme.textContent = theme === 'light' ? '🌙' : '☀️';
    }

    if (els.btnTheme) els.btnTheme.onclick = () => applyTheme(loadTheme() === 'dark' ? 'light' : 'dark');
    if (els.btnSettings) els.btnSettings.onclick = () => showToast('ตั้งค่าอยู่ที่แท็บ Calorie', 'success');
    if (els.dbStripAction) els.dbStripAction.onclick = () => refreshDbStatus();

    applyTheme(loadTheme());
    refreshDbStatus();
  </script>
  <script src="js/update-watch.js?v=45"></script>
</body>
</html>
