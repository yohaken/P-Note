<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="pnote-build" content="19">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="P-Note">
  <title>P-Note</title>
  <script src="js/cache-bootstrap.js?v=19"></script>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/style.css?v=19">
</head>
<body>
  <p id="hello-world-banner" class="hello-world-banner" role="status">hello world</p>
  <div id="app">
    <section id="list-view" class="view" hidden>
      <header class="topbar">
        <div class="topbar-title">
          <h1>P-Note</h1>
          <p id="app-version" class="app-version">v19 · โน้ต</p>
        </div>
        <div class="topbar-actions">
          <button id="export-btn" class="btn btn-text" type="button">สำรอง</button>
          <button id="import-btn" class="btn btn-text" type="button">นำเข้า</button>
          <input id="import-input" type="file" accept="application/json,.json" hidden>
          <button id="manage-tags-btn" class="btn btn-text" type="button">แท็ก</button>
          <button id="settings-btn" class="btn btn-icon btn-ghost" type="button" aria-label="ตั้งค่า">⚙</button>
          <button id="add-note-btn" class="btn btn-icon" type="button" aria-label="เพิ่มโน้ต">+</button>
        </div>
      </header>

      <div class="list-scroll">
        <div id="sort-bar" class="sort-bar" aria-label="จัดเรียงโน้ต">
          <button id="sort-updated-btn" class="sort-chip active" type="button">ล่าสุด</button>
          <button id="sort-schedule-btn" class="sort-chip" type="button">ตามกำหนด</button>
        </div>
        <p id="sync-status" class="sync-status" aria-live="polite"></p>
        <div id="empty-state" class="empty-state" hidden>
          <p id="empty-state-text">ยังไม่มีโน้ต</p>
          <p class="empty-state-hint">มีไฟล์สำรอง? กด <strong>นำเข้า</strong> หรือ ⚙ → วาง JSON</p>
          <button class="btn btn-primary" type="button" onclick="document.getElementById('add-note-btn').click()">
            สร้างโน้ตแรก
          </button>
        </div>
        <div id="notes-list" class="notes-list notes-first"></div>
      </div>

      <footer class="bottom-dock">
        <nav class="group-nav" aria-label="กลุ่มโน้ต">
          <button id="group-active-btn" class="group-tab active" type="button">งาน</button>
          <button id="group-done-btn" class="group-tab" type="button">ทำแล้ว</button>
          <button id="group-trash-btn" class="group-tab" type="button">ถังขยะ</button>
        </nav>
        <div id="tag-filter-bar" class="tag-filter-bar bottom" aria-label="กรองตามแท็ก"></div>
      </footer>
    </section>

    <section id="editor-view" class="view" hidden>
      <header class="topbar editor-topbar">
        <button id="back-btn" class="btn btn-text" type="button">← กลับ</button>
        <div class="topbar-actions">
          <span id="editor-sync-status" class="sync-status inline" aria-live="polite"></span>
        </div>
      </header>
      <div class="editor-body">
        <input id="note-title" class="note-title" type="text" placeholder="หัวข้อโน้ต" autocomplete="off">
        <div class="schedule-field">
          <label class="schedule-label" for="note-schedule">กำหนดการ</label>
          <div class="schedule-input-row">
            <input id="note-schedule" class="note-schedule" type="datetime-local">
            <button id="clear-schedule-btn" class="btn btn-text" type="button">ล้าง</button>
          </div>
        </div>
        <div id="editor-tags" class="editor-tags" aria-label="แท็กของโน้ต"></div>
        <textarea id="note-content" class="note-content" placeholder="พิมพ์โน้ตของคุณ..."></textarea>
      </div>
      <footer class="editor-footer">
        <button id="delete-btn" class="btn btn-danger" type="button">ย้ายไปถังขยะ</button>
      </footer>
    </section>

    <div id="tag-modal" class="modal" hidden>
      <div class="modal-card">
        <h2>จัดการแท็ก</h2>
        <p>สร้างหมวดแท็ก เช่น งานที่ดิน, งานร้านน้ำ แล้วนำไปติดกับโน้ตได้</p>
        <form id="tag-add-form" class="tag-add-row">
          <input id="new-tag-input" class="tag-add-input" type="text" placeholder="ชื่อแท็กใหม่" autocomplete="off" maxlength="40">
          <button id="add-tag-btn" class="btn btn-primary" type="submit">เพิ่ม</button>
        </form>
        <div id="tag-manager-list" class="tag-manager-list"></div>
        <div class="modal-actions">
          <button id="close-tag-modal-btn" class="btn btn-secondary" type="button">ปิด</button>
        </div>
      </div>
    </div>

    <div id="settings-overlay" class="settings-overlay" hidden>
      <div id="settings-backdrop" class="settings-backdrop"></div>
      <div class="settings-panel" role="dialog" aria-labelledby="settings-title">
        <h2 id="settings-title">ตั้งค่า</h2>
        <div class="settings-row">
          <label class="settings-label" for="card-density-slider">ความหนาแน่นการ์ดโน้ต</label>
          <input id="card-density-slider" type="range" min="0" max="100" value="0" step="5">
          <p class="settings-hint">เลื่อนเพื่อย่อการ์ด — เห็นหัวข้อเป็นหลักในภาพรวม</p>
        </div>
        <div class="settings-row">
          <label class="settings-label" for="import-paste">นำเข้าข้อมูลเดิม (JSON)</label>
          <textarea id="import-paste" class="import-paste" rows="4" placeholder='วางไฟล์สำรอง JSON ที่นี่ แล้วกดนำเข้า'></textarea>
          <div class="settings-import-actions">
            <button id="import-paste-btn" class="btn btn-primary" type="button">นำเข้า</button>
            <button id="recover-local-btn" class="btn btn-secondary" type="button">กู้คืนในเครื่อง</button>
          </div>
        </div>
        <button id="close-settings-btn" class="btn btn-secondary settings-close" type="button">ปิด</button>
      </div>
    </div>

    <div id="note-context-menu" class="context-menu" hidden role="menu"></div>

    <div id="update-toast" class="update-toast" hidden role="status" aria-live="polite"></div>
    <button id="refresh-app-btn" class="refresh-fab" type="button" aria-label="รีเฟรชแอป" title="รีเฟรชแอป">↻</button>

    <div id="loading-overlay" class="loading-overlay">
      <div class="spinner"></div>
      <p>กำลังโหลด...</p>
    </div>
  </div>

  <script type="module" src="js/app.js?v=19"></script>
</body>
</html>
