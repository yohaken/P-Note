<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="pnote-build" content="43">
  <meta name="pnote-built" content="2026-07-10T21:52:25+07:00">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <title>P-Note</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background: #000;
      min-height: 100dvh;
      width: 100%;
    }
  </style>
  <script>
    /* wipe old P-Note SW + caches once */
    (function () {
      var KEY = 'pnote_blank_43';
      if (localStorage.getItem(KEY)) return;
      localStorage.setItem(KEY, '1');
      var done = Promise.resolve();
      if ('serviceWorker' in navigator) {
        done = navigator.serviceWorker.getRegistrations().then(function (regs) {
          return Promise.all(regs.map(function (r) { return r.unregister(); }));
        });
      }
      if (window.caches) {
        done = done.then(function () {
          return caches.keys().then(function (keys) {
            return Promise.all(keys.map(function (k) { return caches.delete(k); }));
          });
        });
      }
      done.then(function () { location.reload(); });
    })();
  </script>
</head>
<body></body>
</html>
