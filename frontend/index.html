<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="P-Note">
  <title>P-Note</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <section id="login-view" class="view" hidden>
      <div class="hero">
        <div class="logo">P</div>
        <h1>P-Note</h1>
        <p>hello world</p>
        <p>โน้ตส่วนตัว ซิงค์ผ่าน Google Drive</p>
      </div>
      <button id="login-btn" class="btn btn-primary btn-large" type="button">
        Sign in with Google
      </button>
      <p id="login-error" class="error-text" role="alert"></p>
    </section>

    <section id="denied-view" class="view" hidden>
      <div class="hero">
        <div class="logo danger">!</div>
        <h1>Access Denied</h1>
        <p id="denied-message">บัญชีนี้ไม่มีสิทธิ์ใช้งาน</p>
      </div>
    </section>

    <section id="list-view" class="view" hidden>
      <header class="topbar">
        <div class="topbar-title">
          <h1>P-Note</h1>
          <p class="hello-world">hello world</p>
        </div>
        <div class="topbar-actions">
          <button id="add-note-btn" class="btn btn-icon" type="button" aria-label="เพิ่มโน้ต">+</button>
          <button id="sign-out-btn" class="btn btn-text" type="button">ออก</button>
        </div>
      </header>
      <p id="sync-status" class="sync-status" aria-live="polite"></p>
      <div id="empty-state" class="empty-state" hidden>
        <p>ยังไม่มีโน้ต</p>
        <button class="btn btn-primary" type="button" onclick="document.getElementById('add-note-btn').click()">
          สร้างโน้ตแรก
        </button>
      </div>
      <div id="notes-list" class="notes-list"></div>
    </section>

    <section id="editor-view" class="view" hidden>
      <header class="topbar editor-topbar">
        <button id="back-btn" class="btn btn-text" type="button">← กลับ</button>
        <div class="topbar-actions">
          <span id="editor-sync-status" class="sync-status inline" aria-live="polite"></span>
          <button id="save-btn" class="btn btn-primary" type="button">บันทึก</button>
        </div>
      </header>
      <div class="editor-body">
        <input id="note-title" class="note-title" type="text" placeholder="หัวข้อโน้ต" autocomplete="off">
        <textarea id="note-content" class="note-content" placeholder="พิมพ์โน้ตของคุณ..."></textarea>
      </div>
      <footer class="editor-footer">
        <button id="delete-btn" class="btn btn-danger" type="button">ลบโน้ต</button>
      </footer>
    </section>

    <div id="conflict-modal" class="modal" hidden>
      <div class="modal-card">
        <h2>ข้อมูลขัดแย้ง</h2>
        <p>ไฟล์บน Google Drive ถูกแก้ไขจากที่อื่น ต้องการใช้ข้อมูลใด?</p>
        <div class="modal-actions">
          <button id="use-local-btn" class="btn btn-primary" type="button">ใช้ของเครื่องนี้</button>
          <button id="use-remote-btn" class="btn btn-secondary" type="button">โหลดจาก cloud</button>
        </div>
      </div>
    </div>

    <div id="loading-overlay" class="loading-overlay">
      <div class="spinner"></div>
      <p>กำลังโหลด...</p>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
